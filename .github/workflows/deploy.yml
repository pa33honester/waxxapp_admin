name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            workflow:
              - '.github/workflows/deploy.yml'

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.workflow == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.workflow == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.workflow == 'true'
        working-directory: frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy frontend build
        if: steps.changes.outputs.frontend == 'true' || steps.changes.outputs.workflow == 'true'
        run: |
          GOOGLE_FILE="${{ vars.DEPLOY_PATH }}/backend/public/google571f8db131a7223d.html"
          if [ -f "$GOOGLE_FILE" ]; then
            cp "$GOOGLE_FILE" /tmp/
          fi
          mkdir -p ${{ vars.DEPLOY_PATH }}/backend/public
          rm -rf ${{ vars.DEPLOY_PATH }}/backend/public/*
          cp -r frontend/build/* ${{ vars.DEPLOY_PATH }}/backend/public/
          if [ -f "/tmp/google571f8db131a7223d.html" ]; then
            cp /tmp/google571f8db131a7223d.html "$GOOGLE_FILE"
            rm /tmp/google571f8db131a7223d.html
          fi

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Install backend dependencies (production only)
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.workflow == 'true'
        working-directory: backend
        run: npm ci --omit=dev

      - name: Sync backend source
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.workflow == 'true'
        run: |
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='public' \
            --exclude='storage' \
            --exclude='config.js' \
            --exclude='setting.js' \
            --exclude='.env' \
            backend/ ${{ vars.DEPLOY_PATH }}/backend/

      - name: Sync backend node_modules
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.workflow == 'true'
        run: |
          rsync -a --delete \
            backend/node_modules/ ${{ vars.DEPLOY_PATH }}/backend/node_modules/

      - name: Restart PM2
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.workflow == 'true'
        run: pm2 restart waxxapp
