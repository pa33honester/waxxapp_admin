name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Install backend dependencies (production only)
        working-directory: backend
        run: npm ci --omit=dev

      # ── Deploy ────────────────────────────────────────────────────────────
      # Sync backend source files — preserves config.js, setting.js, .env, and storage/
      - name: Sync backend source
        run: |
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='public' \
            --exclude='storage' \
            --exclude='config.js' \
            --exclude='setting.js' \
            --exclude='.env' \
            backend/ ${{ vars.DEPLOY_PATH }}/backend/

      - name: Sync backend node_modules
        run: |
          rsync -a --delete \
            backend/node_modules/ ${{ vars.DEPLOY_PATH }}/backend/node_modules/

      # Deploy frontend build into backend/public (preserves Google verification file)
      - name: Deploy frontend build
        run: |
          GOOGLE_FILE="${{ vars.DEPLOY_PATH }}/backend/public/google571f8db131a7223d.html"
          if [ -f "$GOOGLE_FILE" ]; then
            cp "$GOOGLE_FILE" /tmp/
          fi
          mkdir -p ${{ vars.DEPLOY_PATH }}/backend/public
          rm -rf ${{ vars.DEPLOY_PATH }}/backend/public/*
          cp -r frontend/build/* ${{ vars.DEPLOY_PATH }}/backend/public/
          if [ -f "/tmp/google571f8db131a7223d.html" ]; then
            cp /tmp/google571f8db131a7223d.html "$GOOGLE_FILE"
            rm /tmp/google571f8db131a7223d.html
          fi

      - name: Restart PM2
        run: pm2 restart waxxapp
